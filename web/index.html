<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ckpt — Claude checkpoints</title>
  <!-- Bootstrap the saved theme synchronously, before any stylesheet
       evaluates, so a reload doesn't flash the default dark theme on top of
       a user who chose a light one. Mirrors the THEMES list in app.js;
       keep them in sync if you add another theme. -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('ckpt.settings') || '{}');
        var ok = ['claude-light', 'github-dark', 'github-light'];
        if (s && ok.indexOf(s.theme) >= 0) {
          document.documentElement.setAttribute('data-theme', s.theme);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">loading…</div>
  <script type="module" src="app.js"></script>
</body>
</html>
